name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decrypt environment variables
        run: |
          # Decrypt .env file using private key
          npx dotenvx decrypt -f .env --stdout > .env.decrypted

          # Export Cloudflare credentials
          echo "CLOUDFLARE_API_KEY=$(grep '^CLOUDFLARE_API_KEY=' .env.decrypted | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "CLOUDFLARE_EMAIL=$(grep '^CLOUDFLARE_EMAIL=' .env.decrypted | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=$(grep '^CLOUDFLARE_ACCOUNT_ID=' .env.decrypted | cut -d'=' -f2-)" >> $GITHUB_ENV
          echo "CLOUDFLARE_D1_TOKEN=$(grep '^CLOUDFLARE_D1_TOKEN=' .env.decrypted | cut -d'=' -f2-)" >> $GITHUB_ENV

          # Create secrets file for wrangler (exclude Cloudflare credentials, only worker secrets)
          grep -v '^#' .env.decrypted | grep -v '^DOTENV_PUBLIC_KEY' | grep -v '^CLOUDFLARE_' > .secrets.env

          # Clean up
          rm .env.decrypted
        env:
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}

      - name: Generate TypeScript types
        run: npx wrangler types
        env:
          CLOUDFLARE_API_KEY: ${{ env.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ env.CLOUDFLARE_EMAIL }}

      - name: Run database migrations
        run: npx wrangler d1 migrations apply shopify-zalo-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_D1_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload secrets to Cloudflare
        run: |
          # Upload all secrets from .secrets.env
          npx wrangler secret bulk .secrets.env

          # Clean up
          rm .secrets.env
        env:
          CLOUDFLARE_API_KEY: ${{ env.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ env.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_KEY: ${{ env.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ env.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
