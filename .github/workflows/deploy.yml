name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decrypt environment variables
        run: |
          # Decrypt .env file using private key
          npx dotenvx decrypt -f .env --stdout > .env.decrypted

          # Export Cloudflare credentials
          echo "CLOUDFLARE_API_KEY=$(grep '^CLOUDFLARE_API_KEY=' .env.decrypted | cut -d'=' -f2)" >> $GITHUB_ENV
          echo "CLOUDFLARE_EMAIL=$(grep '^CLOUDFLARE_EMAIL=' .env.decrypted | cut -d'=' -f2)" >> $GITHUB_ENV

          # Export all secret names for worker deployment
          SECRET_NAMES=$(grep -v '^#' .env.decrypted | grep -v '^DOTENV_PUBLIC_KEY' | cut -d'=' -f1)
          echo "WORKER_SECRET_NAMES<<EOF" >> $GITHUB_ENV
          echo "$SECRET_NAMES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # Export all secrets for deployment
          cat .env.decrypted >> $GITHUB_ENV

          # Clean up decrypted file
          rm .env.decrypted
        env:
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}

      - name: Generate TypeScript types
        run: npx wrangler types
        env:
          CLOUDFLARE_API_KEY: ${{ env.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ env.CLOUDFLARE_EMAIL }}

      - name: Run database migrations
        run: npx wrangler d1 migrations apply shopify-zalo-db --remote
        env:
          CLOUDFLARE_API_KEY: ${{ env.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ env.CLOUDFLARE_EMAIL }}

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_KEY: ${{ env.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ env.CLOUDFLARE_EMAIL }}
